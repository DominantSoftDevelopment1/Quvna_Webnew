<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Select Preview</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0A0A0A;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .flag-emoji {
            font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
            font-size: 1.5rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 2rem;
            height: 2rem;
        }
        .country-item {
            transition: all 0.2s;
        }
        .country-item:hover {
            background: rgba(63, 63, 70, 0.7);
        }
        .country-item.selected {
            background: rgba(16, 185, 129, 0.12);
            border-color: rgba(16, 185, 129, 0.4);
            box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.18);
        }
        /* Scrollbar */
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 2px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-[420px] rounded-3xl border border-zinc-700/80 bg-gradient-to-b from-[#18181B] to-[#101012] shadow-2xl shadow-black/40 backdrop-blur overflow-hidden">
        <!-- Header -->
        <div class="border-b border-zinc-700/70">
            <div class="px-4 py-3 flex items-center gap-3">
                <button class="p-2 hover:bg-zinc-800/80 rounded-xl transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
                    </svg>
                </button>
                <h1 class="text-lg font-semibold tracking-tight">Davlatni tanlang</h1>
            </div>
        </div>

        <div class="px-4 pb-4 flex flex-col gap-3">
            <!-- Search -->
            <div class="relative">
                <input
                    type="text"
                    placeholder="Qidirish..."
                    class="w-full bg-zinc-900/90 border border-zinc-700 rounded-xl pl-10 pr-4 py-3 text-white placeholder-zinc-500 focus:outline-none focus:border-emerald-500/80 focus:ring-2 focus:ring-emerald-500/20 transition-all"
                />
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                </svg>
            </div>

            <!-- Countries List -->
            <div class="max-h-[60vh] overflow-y-auto pr-1 space-y-2 custom-scroll">
                <!-- Uzbekistan -->
                <button class="country-item selected w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-emerald-500/40">
                    <span class="flag-emoji">🇺🇿</span>
                    <span class="flex-1 text-left text-base font-medium">Uzbekistan</span>
                    <div class="w-5 h-5 rounded-full border-2 border-emerald-500 bg-emerald-500 flex items-center justify-center shrink-0">
                        <div class="w-2 h-2 bg-white rounded-full"></div>
                    </div>
                </button>

                <!-- Russia -->
                <button class="country-item w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-zinc-800/80 bg-zinc-900/40">
                    <span class="flag-emoji">🇷🇺</span>
                    <span class="flex-1 text-left text-base font-medium">Russia</span>
                    <div class="w-5 h-5 rounded-full border-2 border-zinc-600 flex items-center justify-center shrink-0"></div>
                </button>

                <!-- United States -->
                <button class="country-item w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-zinc-800/80 bg-zinc-900/40">
                    <span class="flag-emoji">🇺🇸</span>
                    <span class="flex-1 text-left text-base font-medium">United States</span>
                    <div class="w-5 h-5 rounded-full border-2 border-zinc-600 flex items-center justify-center shrink-0"></div>
                </button>

                <!-- Turkey -->
                <button class="country-item w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-zinc-800/80 bg-zinc-900/40">
                    <span class="flag-emoji">🇹🇷</span>
                    <span class="flex-1 text-left text-base font-medium">Turkey</span>
                    <div class="w-5 h-5 rounded-full border-2 border-zinc-600 flex items-center justify-center shrink-0"></div>
                </button>

                <!-- Kazakhstan -->
                <button class="country-item w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-zinc-800/80 bg-zinc-900/40">
                    <span class="flag-emoji">🇰🇿</span>
                    <span class="flex-1 text-left text-base font-medium">Kazakhstan</span>
                    <div class="w-5 h-5 rounded-full border-2 border-zinc-600 flex items-center justify-center shrink-0"></div>
                </button>

                <!-- Germany -->
                <button class="country-item w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-zinc-800/80 bg-zinc-900/40">
                    <span class="flag-emoji">🇩🇪</span>
                    <span class="flex-1 text-left text-base font-medium">Germany</span>
                    <div class="w-5 h-5 rounded-full border-2 border-zinc-600 flex items-center justify-center shrink-0"></div>
                </button>

                <!-- France -->
                <button class="country-item w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-zinc-800/80 bg-zinc-900/40">
                    <span class="flag-emoji">🇫🇷</span>
                    <span class="flex-1 text-left text-base font-medium">France</span>
                    <div class="w-5 h-5 rounded-full border-2 border-zinc-600 flex items-center justify-center shrink-0"></div>
                </button>

                <!-- China -->
                <button class="country-item w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-zinc-800/80 bg-zinc-900/40">
                    <span class="flag-emoji">🇨🇳</span>
                    <span class="flex-1 text-left text-base font-medium">China</span>
                    <div class="w-5 h-5 rounded-full border-2 border-zinc-600 flex items-center justify-center shrink-0"></div>
                </button>

                <!-- Japan -->
                <button class="country-item w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-zinc-800/80 bg-zinc-900/40">
                    <span class="flag-emoji">🇯🇵</span>
                    <span class="flex-1 text-left text-base font-medium">Japan</span>
                    <div class="w-5 h-5 rounded-full border-2 border-zinc-600 flex items-center justify-center shrink-0"></div>
                </button>

                <!-- South Korea -->
                <button class="country-item w-full flex items-center gap-3 px-4 py-3 rounded-xl border border-zinc-800/80 bg-zinc-900/40">
                    <span class="flag-emoji">🇰🇷</span>
                    <span class="flex-1 text-left text-base font-medium">South Korea</span>
                    <div class="w-5 h-5 rounded-full border-2 border-zinc-600 flex items-center justify-center shrink-0"></div>
                </button>
            </div>
        </div>

        <!-- Bottom Button -->
        <div class="border-t border-zinc-700/70 p-4">
            <button class="w-full h-11 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold rounded-xl transition-colors">
                Saqlash
            </button>
        </div>
    </div>
</body>
</html>
