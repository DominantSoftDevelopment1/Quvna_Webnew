name: Deploy to quvna.com

on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'

    steps:
      # appleboy/ssh-action aks holda «Error: missing server host»
      # (VPS_HOST bo‘sh yoki Actions secret umuman yozilmagan).
      - name: Deploy secretlari bor-yo‘qligini tekshirish
        shell: bash
        run: |
          set -e
          missing=()
          [[ -z "${{ secrets.VPS_HOST }}" ]] && missing+=("VPS_HOST")
          [[ -z "${{ secrets.VPS_USER }}" ]] && missing+=("VPS_USER")
          [[ -z "${{ secrets.VPS_SSH_KEY }}" ]] && missing+=("VPS_SSH_KEY")
          if ((${#missing[@]})); then
            echo "::error title=Actions secretları yo‘q::Repozitoriy: Settings → Secrets and variables → Actions → Repository secrets. Qo'shing: ${missing[*]}. Qo‘shimcha README «quvna.com — CI/CD» bo‘limi."
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /var/www/quvna_web2
            git fetch origin master
            git reset --hard origin/master
            npm ci
            export NEXT_TELEMETRY_DISABLED=1
            npm run build
            pm2 restart quvna_web2
            pm2 save
            echo "Deploy muvaffaqiyatli!"
