name: Deploy to quvna.com

on:
  push:
    branches: [master]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Secret yo‘q bo‘lsa ishni to‘xtatmaymiz (yashil), faqat SSH qadamni o‘tkazmaymiz.
    # Qo‘shish: Repo → Settings → Secrets and variables → Actions → VPS_HOST, VPS_USER, VPS_SSH_KEY
    if: ${{ github.ref == 'refs/heads/master' && secrets.VPS_HOST != '' && secrets.VPS_USER != '' && secrets.VPS_SSH_KEY != '' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /var/www/quvna_web2
            git fetch origin master
            git reset --hard origin/master
            npm ci
            export NEXT_TELEMETRY_DISABLED=1
            npm run build
            pm2 restart quvna_web2
            pm2 save
            echo "Deploy muvaffaqiyatli!"
